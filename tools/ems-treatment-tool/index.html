<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>EMS Behandelingstool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <header>
    <h1 id="appTitle">EMS Behandelingstool</h1>
    <p id="appSubtitle"></p>
  </header>

  <div class="container">

    <!-- INPUT -->
    <div class="panel">

      <h2>Patiëntstatus</h2>

      <label>Hartslag / pols</label>
      <input type="number" id="heartRate">

      <label>Bloeddruk</label>
      <input type="text" id="bloodPressure" placeholder="120/80">

      <label>Lichaamstemperatuur</label>
      <input type="number" id="temperature" step="0.1">

      <label>Pijnlevel</label>
      <select id="painLevel"></select>

      <label>Bloedverlies</label>
      <select id="bloodLoss"></select>

      <h2>Letsels per lichaamsdeel</h2>
      <div id="bodyPartsContainer"></div>

      <button onclick="analyze()">Analyseer</button>

    </div>

    <!-- OUTPUT -->
    <div class="panel">

      <h2>Resultaat</h2>

      <div id="urgency"></div>
      <div id="treatment"></div>
      <div id="general"></div>
      <div id="warnings"></div>

      <button onclick="copyResult()">Kopieer</button>
      <button onclick="downloadResult()">Download</button>

    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
